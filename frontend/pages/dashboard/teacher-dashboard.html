<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faculty Course File Management System | Faculty Dashboard</title>
    <link rel="stylesheet" href="../../assets/css/teacher-dashboard.css">
    <link rel="icon" type="image/svg+xml" href="../../assets/icons/favicon.svg">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="dashboard-container">
        <nav class="sidebar">
            <h2>Faculty Course File Management System</h2>
            <ul>
                <li class="active"><i class="fas fa-home"></i> Dashboard</li>
                <li><i class="fas fa-book"></i> My Courses</li>
                <li><i class="fas fa-upload"></i> Upload Files</li>
                <li><a href="#" id="logoutButton" class="nav-link-reset"><i class="fas fa-sign-out-alt"></i> Logout</a></li>
            </ul>
        </nav>

        <main class="content">
            <header>
                <h1>Welcome, <span id="welcomeName">Faculty Member</span></h1>
                <p>Manage your course folders and academic records.</p>
            </header>

            <section class="upload-section">
                <h3><i class="fas fa-file-upload"></i> Upload Course Document</h3>
                <p class="helper-note">Local mode: this saves file records in MySQL only.</p>
                <form id="uploadForm">
                    <div class="form-group">
                        <label for="facultySelect">Faculty Name</label>
                        <select id="facultySelect" required>
                            <option value="">-- Choose Faculty --</option>
                            <option value="fahad-malik">Fahad Malik</option>
                            <option value="kainat">Kainat Sajid</option>
                            <option value="fizza">Fizza</option>
                            <option value="zeeshan">Zeeshan</option>
                            <option value="hadia">Hadia</option>
                            <option value="zohair">Zohair</option>
                            <option value="maryam">Maryam</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="courseSelect">Select Course</label>
                        <select id="courseSelect" required>
                            <option value="">-- Choose Course --</option>
                            <option value="cs101">Introduction to Computing</option>
                            <option value="cs202">Data Structures</option>
                            <option value="cs303">Software Engineering</option>
                            <option value="cs304">Web Development</option>
                            <option value="cs305">Cybersecurity</option>
                            <option value="cs306">Artificial Intelligence</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="fileType">Document Type</label>
                        <select id="fileType" required>
                            <option value="Syllabus">Syllabus</option>
                            <option value="Lesson Plan">Lesson Plan</option>
                            <option value="Assessment">Assessment</option>
                            <option value="CCP">CCP</option>
                            <option value="Quiz">Quiz</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="fileInput">Choose File (Max 20MB)</label>
                        <input type="file" id="fileInput" accept=".pdf,.doc,.docx">
                    </div>

                    <button type="submit" class="btn-submit">Save File Record</button>
                </form>
                <div id="statusMessage"></div>
            </section>

            <section class="data-table">
                <h3><i class="fas fa-folder-open"></i> Managed Uploads</h3>
                <table id="fileTable">
                    <thead>
                        <tr>
                            <th>Course</th>
                            <th>Doc Type</th>
                            <th>File Name</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="fileListBody"></tbody>
                </table>
            </section>
        </main>
    </div>

    <script type="module" src="../../assets/js/teacher-dashboard.js"></script>
</body>
</html>
